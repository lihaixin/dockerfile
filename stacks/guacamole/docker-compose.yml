services:
  # --- 1. 初始化容器：修正参数为 --postgresql ---
  guac-init:
    image: guacamole/guacamole:latest
    container_name: guac_init_provider
    user: root
    entrypoint: 
      - /bin/sh
      - -c
      - |
        # 即使文件存在也重新生成，确保内容正确
        /opt/guacamole/bin/initdb.sh --postgresql > /init_dir/initdb.sql
        chmod 666 /init_dir/initdb.sql
        echo "SQL 脚本已重新生成并修正参数"
    volumes:
      - guac_init_script:/init_dir

  # --- 2. 数据库 ---
  guacamole-db:
    image: postgres:15-alpine
    container_name: guacamole_db
    depends_on:
      guac-init:
        condition: service_completed_successfully
    environment:
      - POSTGRES_DB=guacamole_db
      - POSTGRES_USER=guacamole_user
      - POSTGRES_PASSWORD=your_secure_password
    volumes:
      - guac_db_data:/var/lib/postgresql/data
      - guac_init_script:/docker-entrypoint-initdb.d:ro
    networks:
      vlan:
        ipv4_address: 172.19.0.225
    restart: unless-stopped

  # --- 3. 后端代理 ---
  guacd:
    image: guacamole/guacd:latest
    container_name: guacd
    network_mode: "service:guacamole-db"
    restart: unless-stopped

  # --- 4. 前端界面 ---
  guacamole:
    image: guacamole/guacamole:latest
    container_name: guacamole
    depends_on:
      - guacamole-db
    environment:
      - GUACD_HOSTNAME=127.0.0.1
      - POSTGRES_HOSTNAME=127.0.0.1
      - POSTGRES_DATABASE=guacamole_db
      - POSTGRES_USER=guacamole_user
      - POSTGRES_PASSWORD=your_secure_password
    network_mode: "service:guacamole-db"
    restart: unless-stopped

volumes:
  guac_db_data:
  guac_init_script:

networks:
  vlan:
    external: true
